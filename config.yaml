# Local LLM Configuration for delegation
# Canonical copy — the active file lives in the uv tool's site-packages.
# If you `uv tool upgrade`, re-copy this to site-packages/config.yaml.
# Endpoint + model name are set via env (OPENAI_BASE_URL, LOCAL_MODEL_NAME)
# in the ZCode MCP config, which take precedence over this file.
model:
  name: "delegation-worker-1"   # default worker; overridable per-call via the `model` param
  temperature: 0.1              # low for deterministic code output
  max_tokens: 32768
  extra_params:
    top_p: 0.80
